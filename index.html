<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Main</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }

    #wrapper {
      width: 1920px;
      height: 1020px;
      position: absolute;
      transform-origin: top left;
    }

    iframe {
      width: 1920px;
      height: 1020px;
      border: none;
      display: block;
    }

    .page-nav {
      position: fixed;
      top: 20px;
      right: 20px;
      display: flex;
      gap: 8px;
      z-index: 99999;
    }

    .page-nav button {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      border: none;
      background: rgba(0, 0, 0, 0.35);
      color: #fff;
      font-size: 24px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s ease;
    }

    .page-nav button:hover { background: rgba(0, 0, 0, 0.6); }
    .page-nav button:disabled { opacity: 0.2; cursor: default; pointer-events: none; }

    @keyframes pulse-red {
      0%, 100% { box-shadow: 0 0 0 0 rgba(255, 0, 0, 0.8); outline: 3px solid red; }
      50%       { box-shadow: 0 0 0 8px rgba(255, 0, 0, 0);  outline: 3px solid red; }
    }

    .pulse-next {
      animation: pulse-red 0.8s ease-in-out infinite;
    }
  </style>
</head>
<body>

  <div class="page-nav">
    <button id="btn-prev" onclick="navigate(-1)" title="이전">&#9664;</button>
    <button id="btn-next" onclick="navigate(1)"  title="다음">&#9654;</button>
  </div>

  <div id="wrapper">
    <iframe id="content"></iframe>
  </div>

  <script>
    // 하위 HTML 목록 — 추가 시 여기에만 추가
    const pages = [
      'math_01.html',
      'math_02.html',
      'math_03.html',
    ];

    let currentIndex = 0;

    function loadPage(index) {
      currentIndex = index;
      document.getElementById('content').src = pages[currentIndex];
      document.getElementById('btn-prev').disabled = currentIndex === 0;
      document.getElementById('btn-next').disabled = currentIndex === pages.length - 1;
    }

    function navigate(dir) {
      const next = currentIndex + dir;
      if (next >= 0 && next < pages.length) loadPage(next);
    }

    function scaleWrapper() {
      const scale = Math.min(window.innerWidth / 1920, window.innerHeight / 1020);
      document.getElementById('wrapper').style.transform = `scale(${scale})`;
    }
    window.addEventListener('resize', scaleWrapper);
    scaleWrapper();

    window.addEventListener('message', function(e) {
      if (e.data === 'allAnswered') {
        const btn = document.getElementById('btn-next');
        btn.classList.add('pulse-next');
        btn.addEventListener('click', function() {
          btn.classList.remove('pulse-next');
        }, { once: true });
      }
    });

    // 초기 로드
    loadPage(0);
  </script>

</body>
</html>
