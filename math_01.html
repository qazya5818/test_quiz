<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz Layout</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      background: #ffffff;
    }

    .canvas {
      position: relative;
      width: 1920px;
      height: 1080px;
    }

    .item {
      position: absolute;
    }

    .item img {
      display: block;
    }

    .btn {
      cursor: pointer;
      transition: transform 0.15s ease;
    }

    .btn:hover {
      transform: scale(1.05);
    }

    .btn.disabled {
      pointer-events: none;
    }

    @keyframes badgePop {
      0%   { transform: scale(0);    opacity: 0; }
      30%  { transform: scale(0.2);  opacity: 1; }
      70%  { transform: scale(1.2);  opacity: 1; }
      85%  { transform: scale(0.92); opacity: 1; }
      100% { transform: scale(1);    opacity: 1; }
    }

    .badge-pop {
      animation: badgePop 0.4s cubic-bezier(0.5, 0, 0.34, 1.56) forwards;
    }

    /* Quiz pages */
    .quiz-page {
      position: absolute;
      width: 1920px;
      height: 1080px;
      top: 0;
      left: 0;
      display: none;
    }

    .quiz-page.active {
      display: block;
    }

    .quiz-text {
      font-family: 'KoPubDotum', 'KoPub돋움', 'KoPub돋움체', sans-serif;
      font-weight: bold;
      font-size: 56pt;
      line-height: 140%;
      letter-spacing: 0;
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>

    function showConfetti() {
      const el = document.getElementById('confetti');
      el.style.display = 'block';
      confettiAnim.goToAndPlay(0, true);
      confettiAnim.onComplete = () => { el.style.display = 'none'; };
    }

    // 사운드
    const sndCorrect = new Audio('media/anschk_o.mp3');
    const sndWrong   = new Audio('media/anschk_x.mp3');

    function playSound(isCorrect) {
      const snd = isCorrect ? sndCorrect : sndWrong;
      snd.currentTime = 0;
      snd.play();
    }

    // 페이지별 독립 상태
    const pageStates = Array.from({ length: TOTAL_PAGES }, () => ({
      btnYes: false,
      btnNo: false,
      btnMainYes: false,
    }));

    /* ---- Navigation ---- */

    function navigate(dir) {
      const next = currentPage + dir;
      if (next < 0 || next >= TOTAL_PAGES) return;
      goToPage(next);
    }

    function goToPage(index) {
      document.getElementById(`page-${currentPage}`).classList.remove('active');
      currentPage = index;
      resetPage(currentPage);
      document.getElementById(`page-${currentPage}`).classList.add('active');
      updateNavUI();
    }

    function updateNavUI() {
      const leftBtn = document.getElementById('arrow_left');
      const rightBtn = document.getElementById('arrow_right');
      const leftImg = document.getElementById('arrow_left_img');
      const rightImg = document.getElementById('arrow_right_img');

      // 첫 문제: left_1 (비활성), right_2 (활성)
      // 중간 문제: left_2 (활성), right_2 (활성)
      // 마지막 문제: left_2 (활성), right_1 (비활성)
      if (currentPage === 0) {
        leftImg.src = '01/arrow_left_1.png';
        leftBtn.style.pointerEvents = 'none';
      } else {
        leftImg.src = '01/arrow_left_2.png';
        leftBtn.style.pointerEvents = 'auto';
      }

      if (currentPage === TOTAL_PAGES - 1) {
        rightImg.src = '01/arrow_right_1.png';
        rightBtn.style.pointerEvents = 'none';
      } else {
        rightImg.src = '01/arrow_right_2.png';
        rightBtn.style.pointerEvents = 'auto';
      }

      // navi 위치 이동: 1번=910, 2번=946, 3번=982
      const naviX = [910, 946, 982][currentPage];
      document.getElementById('navi').style.left = naviX + 'px';
    }

    /* ---- Quiz Buttons ---- */

    function clickBtnYes(page) {
      const state = pageStates[page];
      state.btnYes = !state.btnYes;
      document.querySelector(`#btn_yes-${page} img`).src =
        state.btnYes ? '01/btn_yes2.png' : '01/btn_yes.png';

      // btn_no 초기화
      state.btnNo = false;
      document.querySelector(`#btn_no-${page} img`).src = '01/btn_no.png';
    }

    function clickBtnNo(page) {
      const state = pageStates[page];
      state.btnNo = !state.btnNo;
      document.querySelector(`#btn_no-${page} img`).src =
        state.btnNo ? '01/btn_no2.png' : '01/btn_no.png';

      // btn_yes 초기화
      state.btnYes = false;
      document.querySelector(`#btn_yes-${page} img`).src = '01/btn_yes.png';
    }

    function clickBtnMainYes(page) {
      const state = pageStates[page];
      state.btnMainYes = !state.btnMainYes;

      if (state.btnMainYes) {
        document.querySelector(`#btn_mainYes-${page} img`).src = 'common/btn_mainYes2.png';
        const badge = document.getElementById(`badge-${page}`);
        badge.classList.remove('badge-pop');
        badge.style.display = 'block';
        void badge.offsetWidth; // reflow로 애니메이션 재시작
        badge.classList.add('badge-pop');
        document.getElementById(`btn_yes-${page}`).classList.add('disabled');
        document.getElementById(`btn_no-${page}`).classList.add('disabled');

        // 모든 문제 완료 시 부모에 알림
        const allDone = pageStates.every(s => s.btnMainYes);
        if (allDone) window.parent.postMessage('allAnswered', '*');

        // 사용자 선택과 정답 비교 후 사운드 및 컨페티 재생
        const userAnswer = state.btnYes ? true : (state.btnNo ? false : null);
        if (userAnswer !== null) {
          const isCorrect = userAnswer === correctAnswers[page];
          playSound(isCorrect);
          if (isCorrect) showConfetti();
        }
      } else {
        resetPage(page);
      }
    }

    function resetPage(page) {
      const state = pageStates[page];
      state.btnYes = false;
      state.btnNo = false;
      state.btnMainYes = false;
      document.querySelector(`#btn_yes-${page} img`).src = '01/btn_yes.png';
      document.querySelector(`#btn_no-${page} img`).src = '01/btn_no.png';
      document.querySelector(`#btn_mainYes-${page} img`).src = 'common/btn_mainYes.png';
      const badge = document.getElementById(`badge-${page}`);
      badge.classList.remove('badge-pop');
      badge.style.display = 'none';
      document.getElementById(`btn_yes-${page}`).classList.remove('disabled');
      document.getElementById(`btn_no-${page}`).classList.remove('disabled');
    }
  </script>
